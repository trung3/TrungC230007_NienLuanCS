<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(135deg, #74ebd5, #9face6);
        }

        .login-container{
            width:350px;
            background:#fff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
        }

        .login-container h2{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            font-size:16px;
        }

        .input-group input:focus{
            border-color:#6c63ff;
        }

        .btn-login{
            width:100%;
            padding:12px;
            background:#6c63ff;
            color:#fff;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn-login:hover{
            background:#574bdb;
        }

        .extra{
            text-align:center;
            margin-top:20px;
        }

        .extra a{
            text-decoration:none;
            color:#6c63ff;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="login-container">
    <h2>Đăng Nhập</h2>

    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input name="username" type="text" placeholder="Nhập tên đăng nhập">
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu">
        </div>

        <button type="submit" class="btn-login">
            Đăng Nhập
        </button>

        <div class="extra">
            <p>Chưa có tài khoản?
                <a href="#">Đăng ký</a>
            </p>
        </div>
        <div class="alert alert-danger"
     th:if="${param.error}">
    Sai tên đăng nhập hoặc mật khẩu!
</div>
    </form>
</div>

</body>
</html>

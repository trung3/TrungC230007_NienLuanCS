<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main-layout(
          'TechHub — Chi tiết sản phẩm',
          ~{::#main-content}
      )}">

<body>
<div id="main-content" class="container py-4">

    <style>
        .detail-image-box {
            background: #f8f9fa;
            border: 1px solid #eeeeee;
            border-radius: 18px;
            padding: 30px;
        }

        .detail-image {
            width: 100%;
            height: 420px;
            object-fit: contain;
        }

        .detail-brand {
            color: #6c757d;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .detail-price {
            color: #dc3545;
            font-size: 30px;
            font-weight: 700;
        }

        .benefit-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 14px;
            height: 100%;
        }
    </style>

    <!-- Đường dẫn -->
    <nav class="mb-4">
        <a th:href="@{/}"
           class="text-decoration-none text-secondary">
            Trang chủ
        </a>

        <span class="mx-2 text-secondary">/</span>

        <span th:text="${product.productName}">
            Chi tiết sản phẩm
        </span>
    </nav>

    <div class="row g-5">

        <!-- Hình ảnh sản phẩm -->
        <div class="col-lg-6">
            <div class="detail-image-box">
                <img class="detail-image"
                     th:src="@{'/images/' + ${product.image}}"
                     th:alt="${product.productName}">
            </div>
        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-lg-6">

            <p class="detail-brand mb-2"
               th:text="${product.brand != null
                    ? product.brand.brandName
                    : 'Không thương hiệu'}">
            </p>

            <h1 class="fw-semibold mb-3"
                style="font-size:32px"
                th:text="${product.productName}">
            </h1>

            <div class="d-flex align-items-center gap-3 mb-3">
                <span class="text-warning">
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                    <i class="bi bi-star-fill"></i>
                </span>

                <span class="text-secondary">
                    Chính hãng 100%
                </span>
            </div>

            <p class="detail-price mb-4"
               th:text="${#numbers.formatDecimal(
                    product.price, 0, 'POINT', 0, 'COMMA'
               ) + ' đ'}">
            </p>

            <div class="border rounded-4 p-3 mb-4">
                <p class="fw-semibold mb-2">
                    Ưu đãi khi mua sản phẩm
                </p>

                <p class="mb-2">
                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                    Miễn phí giao hàng toàn quốc
                </p>

                <p class="mb-2">
                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                    Trả góp 0% qua thẻ tín dụng
                </p>

                <p class="mb-0">
                    <i class="bi bi-check-circle-fill text-success me-2"></i>
                    Đổi trả trong vòng 7 ngày
                </p>
            </div>

            <!-- Thêm vào giỏ -->
            <form th:action="@{/cart/add/{id}
                    (id=${product.productId})}"
                  method="post">

                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button type="submit"
                        class="btn btn-dark btn-lg w-100 mb-3">
                    <i class="bi bi-cart-plus me-2"></i>
                    Thêm vào giỏ hàng
                </button>
            </form>

            <a th:href="@{/cart}"
               class="btn btn-outline-dark btn-lg w-100">
                <i class="bi bi-cart3 me-2"></i>
                Xem giỏ hàng
            </a>
        </div>
    </div>

    <!-- Chính sách -->
    <div class="row g-3 mt-4">

        <div class="col-md-4">
            <div class="benefit-item">
                <div class="fw-semibold mb-1">
                    🚚 Giao hàng miễn phí
                </div>
                <small class="text-secondary">
                    Áp dụng trên toàn quốc
                </small>
            </div>
        </div>

        <div class="col-md-4">
            <div class="benefit-item">
                <div class="fw-semibold mb-1">
                    🛡️ Bảo hành 24 tháng
                </div>
                <small class="text-secondary">
                    Bảo hành chính hãng
                </small>
            </div>
        </div>

        <div class="col-md-4">
            <div class="benefit-item">
                <div class="fw-semibold mb-1">
                    🔄 Đổi trả 7 ngày
                </div>
                <small class="text-secondary">
                    Nếu sản phẩm gặp lỗi
                </small>
            </div>
        </div>

    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechHub — Cửa hàng Laptop</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">Tech<span>Hub</span></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-3">
                    <li class="nav-item"><a class="nav-link text-secondary" href="#">Laptop</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="#">Phụ kiện</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="#">Bảo hành</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="#">Liên hệ</a></li>
                </ul>
                <button class="btn btn-outline-dark btn-sm d-flex align-items-center gap-2" type="button"
                    data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
                    <i class="bi bi-bag"></i>
                    Giỏ hàng
                    <span class="badge bg-dark cart-badge" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <div class="container py-4">

        <!-- HERO -->
        <div class="hero-section mb-4">
            <div class="row align-items-center">
                <div class="col">
                    <p class="hero-eyebrow mb-2">Chính hãng — Bảo hành 24 tháng</p>
                    <h1 class="fw-semibold mb-2" style="font-size:28px;line-height:1.2">Laptop cho mọi<br>nhu cầu của
                        bạn</h1>
                    <p class="text-secondary mb-3" style="font-size:14px">Gaming · Đồ họa · Văn phòng · Học tập<br>Trả
                        góp 0% — Giao hàng toàn quốc</p>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="badge rounded-pill border text-secondary fw-normal px-3 py-2">🚚 Miễn phí giao
                            hàng</span>
                        <span class="badge rounded-pill border text-secondary fw-normal px-3 py-2">🔄 Đổi trả 7
                            ngày</span>
                        <span class="badge rounded-pill border text-secondary fw-normal px-3 py-2">💳 Trả góp 0%</span>
                    </div>
                </div>
                <div class="col-auto d-none d-md-block">
                    <div class="hero-icon">💻</div>
                </div>
            </div>
        </div>

        <!-- TOOLBAR -->
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4">
            <div class="d-flex flex-wrap gap-2" id="filters"></div>
            <div class="d-flex align-items-center gap-3">
                <div class="search-wrap">
                    <i class="bi bi-search search-icon"></i>
                    <input class="form-control search-input" type="text" placeholder="Tìm laptop..." id="search"
                        oninput="renderGrid()">
                </div>
                <span class="text-muted" style="font-size:13px;white-space:nowrap" id="result-count"></span>
                <select class="form-select form-select-sm" style="font-size:12px;width:auto;border-radius:8px" id="sort"
                    onchange="renderGrid()">
                    <option value="default">Mặc định</option>
                    <option value="price-asc">Giá tăng dần</option>
                    <option value="price-desc">Giá giảm dần</option>
                    <option value="name">Tên A–Z</option>
                </select>
            </div>
        </div>

        <!-- GRID -->
        <div class="row g-3" id="grid"></div>

    </div>

    <!-- TOAST -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
        <div id="liveToast" class="toast align-items-center text-bg-dark border-0 rounded-3" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-msg" style="font-size:13px"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- CART OFFCANVAS -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar" style="width:380px">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-semibold">Giỏ hàng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-0">
            <div class="flex-grow-1 overflow-auto px-3 pt-3" id="cart-items"></div>
            <div class="border-top p-3" id="cart-footer" style="display:none!important">
                <div class="d-flex justify-content-between fw-semibold mb-3">
                    <span>Tổng cộng</span>
                    <span id="cart-total"></span>
                </div>
                <button class="btn btn-dark w-100" style="border-radius:8px">Thanh toán →</button>
            </div>
        </div>
    </div>

   <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/js.js}"></script>
    
</body>

</html>

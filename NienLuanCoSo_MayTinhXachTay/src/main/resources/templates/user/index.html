<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main-layout(
          'TechHub — Cửa hàng Laptop',
          ~{::#main-content}
      )}">

<body>

<div id="main-content" class="container py-4">

    <!-- Banner -->
    <a href="#grid"
       class="d-block text-decoration-none mb-4">

        <img th:src="@{/images/Banner-gaming_laptops (1).jpg}"
             class="w-100 object-fit-cover rounded-4 shadow-sm"
             style="height:clamp(280px, 26vw, 440px);
                    object-position:center"
             alt="Banner gaming laptop">
    </a>

    <!-- Bộ lọc -->
    <div class="bg-white border rounded-4 shadow-sm
                p-3 mb-4">

        <div class="row g-3 align-items-center">

            <!-- Nút danh mục -->
            <div class="col-lg">
                <div id="filters"
                     class="d-flex flex-wrap gap-2">
                </div>
            </div>

            <!-- Tìm kiếm và sắp xếp -->
            <div class="col-lg-auto">

                <div class="d-flex flex-column flex-sm-row
                            align-items-sm-center gap-2">

                    <div class="input-group"
                         style="min-width:240px">

                        <span class="input-group-text bg-white">
                            <i class="bi bi-search"></i>
                        </span>

                        <input class="form-control"
                               type="search"
                               placeholder="Tìm laptop..."
                               id="search">
                    </div>

                    <span id="result-count"
                          class="badge rounded-pill
                                 bg-light text-secondary
                                 border fw-normal px-3 py-2">
                    </span>

                    <select class="form-select"
                            id="sort"
                            style="min-width:155px"
                            onchange="renderGrid()">

                        <option value="default">
                            Mặc định
                        </option>

                        <option value="price-asc">
                            Giá tăng dần
                        </option>

                        <option value="price-desc">
                            Giá giảm dần
                        </option>

                        <option value="name">
                            Tên A–Z
                        </option>
                    </select>

                </div>
            </div>
        </div>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="row g-3 g-xl-4"
         id="grid">

        <div class="col-12 col-sm-6 col-lg-4 col-xl-3"
             th:each="p : ${products}">

            <div class="card h-100 border rounded-4
                        overflow-hidden shadow-sm product-card">

                <!-- Hình sản phẩm -->
                <a th:href="@{/product/{id}
                        (id=${p.productId})}"
                   class="d-flex align-items-center
                          justify-content-center
                          bg-light p-3"
                   style="height:230px">

                    <img th:src="@{'/images/' + ${p.image}}"
                         class="img-fluid h-100 object-fit-contain"
                         th:alt="${p.productName}">
                </a>

                <div class="card-body p-3
                            d-flex flex-column">

                    <!-- Thương hiệu -->
                    <p class="text-uppercase text-secondary
                              small fw-semibold mb-2"
                       th:text="${p.brand != null
                          ? p.brand.brandName
                          : 'Không thương hiệu'}">
                    </p>

                    <!-- Tên sản phẩm -->
                    <h6 class="mb-3"
                        style="min-height:48px">

                        <a th:href="@{/product/{id}
                                (id=${p.productId})}"
                           class="text-decoration-none
                                  text-dark"
                           th:text="${p.productName}">
                        </a>
                    </h6>

                    <!-- Giá và nút thêm -->
                    <div class="d-flex align-items-center
                                justify-content-between
                                gap-2 mt-auto">

                        <span class="fw-bold text-danger"
                              style="font-size:17px"
                              th:text="${#numbers.formatDecimal(
                                p.price,
                                0, 'POINT', 0, 'COMMA'
                              ) + ' đ'}">
                        </span>

                        <form th:action="@{/cart/add/{id}
                                (id=${p.productId})}"
                              method="post"
                              class="m-0">

                            <input type="hidden"
                                   th:if="${_csrf != null}"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}">

                            <button type="submit"
                                    class="btn btn-dark btn-sm
                                           text-nowrap px-3">

                                <i class="bi bi-plus-lg"></i>
                                Thêm
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>

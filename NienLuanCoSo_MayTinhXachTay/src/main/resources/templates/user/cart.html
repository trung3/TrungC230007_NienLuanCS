<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main-layout(
          'TechHub — Giỏ hàng',
          ~{::#main-content}
      )}">

<body>
<div id="main-content" class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <p class="text-secondary mb-1">TechHub</p>
            <h2 class="fw-semibold mb-0">Giỏ hàng của bạn</h2>
        </div>

        <a th:href="@{/index}" class="btn btn-outline-dark">
            <i class="bi bi-arrow-left"></i>
            Tiếp tục mua hàng
        </a>
    </div>

    <!-- Giỏ hàng trống -->
    <div th:if="${#lists.isEmpty(cartItems)}"
         class="text-center border rounded-4 py-5">

        <div style="font-size:60px">🛒</div>
        <h4 class="mt-3">Giỏ hàng đang trống</h4>
        <p class="text-secondary">
            Hãy thêm một chiếc laptop bạn yêu thích.
        </p>

        <a th:href="@{/}" class="btn btn-dark">
            Xem sản phẩm
        </a>
    </div>

    <!-- Có sản phẩm -->
    <div class="row g-4"
         th:unless="${#lists.isEmpty(cartItems)}">

        <div class="col-lg-8">
            <div class="border rounded-4 overflow-hidden">

                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Sản phẩm</th>
                            <th>Đơn giá</th>
                            <th>Số lượng</th>
                            <th>Thành tiền</th>
                            <th></th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:src="@{'/images/' + ${item.image}}"
                                         th:alt="${item.productName}"
                                         style="width:80px;height:60px;
                                                object-fit:contain">

                                    <span class="fw-medium"
                                          th:text="${item.productName}">
                                    </span>
                                </div>
                            </td>

                            <td th:text="${#numbers.formatDecimal(
                                    item.price, 0, 'POINT', 0, 'COMMA'
                                ) + ' đ'}">
                            </td>

                            <td>
                                <div class="d-flex align-items-center gap-1">

                                    <form th:action="@{/cart/update/{id}
                                            (id=${item.productId})}"
                                          method="post">

                                        <input type="hidden"
                                               name="quantity"
                                               th:value="${item.quantity - 1}">

                                        <button class="btn btn-sm btn-outline-secondary">
                                            −
                                        </button>
                                    </form>

                                    <span class="px-2"
                                          th:text="${item.quantity}">
                                    </span>

                                    <form th:action="@{/cart/update/{id}
                                            (id=${item.productId})}"
                                          method="post">

                                        <input type="hidden"
                                               name="quantity"
                                               th:value="${item.quantity + 1}">

                                        <button class="btn btn-sm btn-outline-secondary">
                                            +
                                        </button>
                                    </form>

                                </div>
                            </td>

                            <td class="fw-semibold"
                                th:text="${#numbers.formatDecimal(
                                    item.subtotal, 0, 'POINT', 0, 'COMMA'
                                ) + ' đ'}">
                            </td>

                            <td>
                                <form th:action="@{/cart/remove/{id}
                                        (id=${item.productId})}"
                                      method="post">

                                    <button class="btn btn-sm btn-outline-danger"
                                            title="Xóa sản phẩm">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>

        <div class="col-lg-4">
            <div class="border rounded-4 p-4">
                <h5 class="mb-3">Tóm tắt đơn hàng</h5>

                <div class="d-flex justify-content-between mb-3">
                    <span class="text-secondary">Tổng thanh toán</span>

                    <span class="fw-bold fs-5"
                          th:text="${#numbers.formatDecimal(
                              total, 0, 'POINT', 0, 'COMMA'
                          ) + ' đ'}">
                    </span>
                </div>

               <a th:href="@{/checkout}"
   class="btn btn-dark w-100 mb-2">
    Tiến hành đặt hàng
</a>

                <form th:action="@{/cart/clear}" method="post">
                    <button class="btn btn-outline-danger w-100">
                        Xóa toàn bộ giỏ hàng
                    </button>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>

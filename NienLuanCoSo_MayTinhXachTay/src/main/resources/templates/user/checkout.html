<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: main-layout(
          'TechHub — Thanh toán',
          ~{::#main-content}
      )}">

<body>
<div id="main-content" class="container py-4">

    <div class="mb-4">
        <a th:href="@{/cart}"
           class="text-decoration-none text-secondary">
            <i class="bi bi-arrow-left"></i>
            Quay lại giỏ hàng
        </a>

        <h2 class="fw-semibold mt-3">Thông tin đặt hàng</h2>
    </div>

    <div th:if="${error}"
         class="alert alert-danger"
         th:text="${error}">
    </div>

    <form th:action="@{/checkout/place}" method="post">

        <input type="hidden"
               th:if="${_csrf != null}"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div class="row g-4">

            <!-- Thông tin giao hàng -->
            <div class="col-lg-7">
                <div class="border rounded-4 p-4">

                    <h5 class="mb-4">
                        <i class="bi bi-geo-alt me-2"></i>
                        Thông tin nhận hàng
                    </h5>

                    <div class="mb-3">
                        <label class="form-label">
                            Họ và tên
                        </label>

                        <input type="text"
                               class="form-control"
                               name="fullName"
                               th:value="${user.fullName}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Số điện thoại
                        </label>

                        <input type="tel"
                               class="form-control"
                               name="phone"
                               th:value="${user.phone}"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Địa chỉ nhận hàng
                        </label>

                        <textarea class="form-control"
                                  name="address"
                                  rows="3"
                                  required
                                  th:text="${user.address}">
                        </textarea>
                    </div>

                    <h5 class="mb-3">
                        <i class="bi bi-credit-card me-2"></i>
                        Phương thức thanh toán
                    </h5>

                    <div class="border rounded-3 p-3">
                        <div class="form-check">
                            <input class="form-check-input"
                                   type="radio"
                                   checked>

                            <label class="form-check-label">
                                Thanh toán khi nhận hàng (COD)
                            </label>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Tóm tắt đơn hàng -->
            <div class="col-lg-5">
                <div class="border rounded-4 p-4">

                    <h5 class="mb-4">Đơn hàng của bạn</h5>

                    <div th:each="item : ${cartItems}"
                         class="d-flex gap-3 border-bottom pb-3 mb-3">

                        <img th:src="@{'/images/' + ${item.image}}"
                             th:alt="${item.productName}"
                             style="width:70px;height:55px;
                                    object-fit:contain">

                        <div class="flex-grow-1">
                            <div class="fw-medium"
                                 th:text="${item.productName}">
                            </div>

                            <small class="text-secondary">
                                Số lượng:
                                <span th:text="${item.quantity}"></span>
                            </small>
                        </div>

                        <div class="fw-semibold"
                             th:text="${#numbers.formatDecimal(
                                item.subtotal,
                                0, 'POINT', 0, 'COMMA'
                             ) + ' đ'}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-secondary">Phí giao hàng</span>
                        <span class="text-success">Miễn phí</span>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-semibold">
                            Tổng thanh toán
                        </span>

                        <span class="fw-bold fs-5 text-danger"
                              th:text="${#numbers.formatDecimal(
                                total,
                                0, 'POINT', 0, 'COMMA'
                              ) + ' đ'}">
                        </span>
                    </div>

                    <button type="submit"
                            class="btn btn-dark btn-lg w-100">
                        <i class="bi bi-bag-check me-2"></i>
                        Xác nhận đặt hàng
                    </button>

                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>

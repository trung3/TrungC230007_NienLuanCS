<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sidebar(activePage)">
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white dark:bg-gray-800 shadow-xl z-40 sidebar-transition -translate-x-full lg:translate-x-0 flex flex-col">
    <div class="p-6 border-b dark:border-gray-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center shadow-lg shadow-primary-500/30">
          <i data-lucide="layout-dashboard" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-gray-800 dark:text-white">Admin</h1>
          <p class="text-xs text-gray-400">Quản trị hệ thống</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 overflow-y-auto space-y-1">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-3">Menu chính</p>

      <a th:href="@{/admin/dashboard}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'dashboard' ? 'active text-white bg-primary-500 shadow-lg shadow-primary-500/30' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700'}">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span>Tổng quan</span>
      </a>

      <a th:href="@{/admin/brands}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'brands' ? 'active text-white bg-primary-500 shadow-lg shadow-primary-500/30' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700'}">
        <i data-lucide="tag" class="w-5 h-5"></i>
        <span>Thương hiệu</span>
      </a>

      <a th:href="@{/admin/categories}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'categories' ? 'active text-white bg-primary-500 shadow-lg shadow-primary-500/30' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700'}">
        <i data-lucide="folder-tree" class="w-5 h-5"></i>
        <span>Danh mục</span>
      </a>

     <a th:href="@{/admin/products}" 
   class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
   th:classappend="${activePage == 'products' ? 'active text-white bg-primary-500 shadow-lg shadow-primary-500/30' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700'}">
  <i data-lucide="package" class="w-5 h-5"></i>
  <span>Sản phẩm</span>
</a>
    </nav>
    <div class="d-flex align-items-center gap-3 ms-3">

    <span class="fw-semibold">
        Xin chào,
        <span th:text="${#authentication.name}"></span>
    </span>

    <form th:action="@{/logout}" method="post" class="m-0">
        <button type="submit" class="btn btn-outline-danger btn-sm">
            Đăng xuất
        </button>
    </form>

</div>
  </aside>
</div>
</html>

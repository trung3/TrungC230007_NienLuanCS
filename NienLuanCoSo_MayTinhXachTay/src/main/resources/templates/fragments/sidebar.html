<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sidebar">
  <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-white dark:bg-gray-800 shadow-xl z-40 sidebar-transition -translate-x-full lg:translate-x-0 flex flex-col">
    <div class="p-6 border-b dark:border-gray-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center shadow-lg shadow-primary-500/30">
          <i data-lucide="layout-dashboard" class="w-5 h-5 text-white"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-gray-800 dark:text-white">Admin</h1>
          <p class="text-xs text-gray-400">Quản trị hệ thống</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 overflow-y-auto space-y-1">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-3">Menu chính</p>

      <a th:href="@{/admin}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'dashboard' ? 'active text-white' : 'text-gray-600 dark:text-gray-300'}">
        <i data-lucide="home" class="w-5 h-5"></i>
        <span>Tổng quan</span>
      </a>
      
      <a th:href="@{/admin/users}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'users' ? 'active text-white' : 'text-gray-600 dark:text-gray-300'}">
        <i data-lucide="users" class="w-5 h-5"></i>
        <span>Người dùng</span>
        <span class="ml-auto bg-primary-100 dark:bg-primary-900/40 text-primary-600 dark:text-primary-400 text-xs font-bold px-2 py-0.5 rounded-full">128</span>
      </a>

      <a th:href="@{/admin/products}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'products' ? 'active text-white' : 'text-gray-600 dark:text-gray-300'}">
        <i data-lucide="package" class="w-5 h-5"></i>
        <span>Sản phẩm</span>
      </a>
      <a th:href="@{/admin/products}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'products' ? 'active text-white' : 'text-gray-600 dark:text-gray-300'}">
        <i data-lucide="package" class="w-5 h-5"></i>
        <span>Brand</span>
      </a>
      <a th:href="@{/admin/products}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'products' ? 'active text-white' : 'text-gray-600 dark:text-gray-300'}">
        <i data-lucide="package" class="w-5 h-5"></i>
        <span>Đơn hàng</span>
      </a>
       <a th:href="@{/admin/products}" 
         class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-200"
         th:classappend="${activePage == 'products' ? 'active text-white' : 'text-gray-600 dark:text-gray-300'}">
        <i data-lucide="package" class="w-5 h-5"></i>
        <span>Danh mục</span>
      </a>
      </nav>
      <div class="p-4 border-t dark:border-gray-700">
      <div
        class="flex items-center gap-3 p-2 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer transition-colors">
        <img src="http://static.photos/people/200x200/42" alt="Avatar"
          class="w-10 h-10 rounded-full object-cover ring-2 ring-primary-200">
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-gray-800 dark:text-white truncate">Nguyễn Văn A</p>
          <p class="text-xs text-gray-400 truncate">admin@example.com</p>
        </div>
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
      </div>
    </div>
  </aside>
</div>
</html>

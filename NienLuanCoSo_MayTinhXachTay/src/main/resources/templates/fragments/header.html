      <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
        <i data-lucide="menu" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
      </button>
      <div class="hidden sm:flex items-center gap-2 bg-gray-100 dark:bg-gray-700 rounded-xl px-4 py-2 w-72">
        <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
        <input type="text" placeholder="Tìm kiếm..." class="bg-transparent border-none outline-none text-sm text-gray-700 dark:text-gray-200 w-full placeholder-gray-400">
      </div>
    </div>
    </div>
</header>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" th:href="@{/images/favicon.svg}" type="image/x-icon" />
    <title>PlainAdmin Demo | Bootstrap 5 Admin Template</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/lineicons.css}" type="text/css" />
    <link rel="stylesheet" th:href="@{/css/materialdesignicons.min.css}" type="text/css" />
    <link rel="stylesheet" th:href="@{/css/fullcalendar.css}" />
    <link rel="stylesheet" th:href="@{/css/main.css}" />
  </head>
  <body>
    <div id="preloader">
      <div class="spinner"></div>
    </div>
    
    <aside class="sidebar-nav-wrapper">
      <div class="navbar-logo">
        <a th:href="@{/dashboard}">
          <img th:src="@{/images/logo/logo.svg}" alt="logo" />
        </a>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li class="nav-item nav-item-has-children">
            <a href="#0" data-bs-toggle="collapse" data-bs-target="#dashboardMenu">
              <span class="text">Dashboard</span>
            </a>
            <ul id="dashboardMenu" class="collapse show dropdown-nav">
              <li>
                <a th:href="@{/admin/dashboard}" class="active">Tổng Quan</a>
              </li>
            </ul>
          </li>
          <li class="nav-item nav-item-has-children">
            <a href="#0" class="collapsed" data-bs-toggle="collapse" data-bs-target="#adminMenu">
              <span class="text">Quản Lý</span>
            </a>
            <ul id="adminMenu" class="collapse dropdown-nav">
              <li><a th:href="@{/admin/categories}">Danh Mục</a></li>
              <li><a th:href="@{/admin/brands}">Hãng Laptop</a></li>
              <li><a th:href="@{/admin/products}">Sản Phẩm</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </aside>
    <div class="overlay"></div>

    <main class="main-wrapper">
      <header class="header">
        <div class="container-fluid">
          <div class="row">
            <div class="col-lg-5 col-md-5 col-6">
              <div class="header-left d-flex align-items-center">
                <div class="menu-toggle-btn mr-15">
                  <button id="menu-toggle" class="main-btn primary-btn btn-hover">
                    <i class="lni lni-chevron-left me-2"></i> Menu
                  </button>
                </div>
              </div>
            </div>
            <div class="col-lg-7 col-md-7 col-6">
              <div class="header-right">
                <div class="profile-box ml-15">
                  <button class="dropdown-toggle bg-transparent border-0" type="button" id="profile" data-bs-toggle="dropdown" aria-expanded="false">
                    <div class="profile-info">
                      <div class="info">
                        <div class="image">
                          <img th:src="@{/images/profile/profile-image.png}" alt="" />
                        </div>
                        <div>
                          <h6 class="fw-500">Adam Joe</h6>
                          <p>Admin</p>
                        </div>
                      </div>
                    </div>
                  </button>
                  <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profile">
                    <li>
                      <div class="author-info flex items-center !p-1">
                        <div class="image">
                          <img th:src="@{/images/profile/profile-image.png}" alt="image" />
                        </div>
                        <div class="content">
                          <h4 class="text-sm">Adam Joe</h4>
                          <a class="text-black/40 dark:text-white/40 hover:text-black dark:hover:text-white text-xs" href="#">Email@gmail.com</a>
                        </div>
                      </div>
                    </li>
                    <li class="divider"></li>
                    <li><a href="#0"><i class="lni lni-user"></i> View Profile</a></li>
                    <li><a href="#0"><i class="lni lni-exit"></i> Sign Out</a></li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </header>

      <section class="section">
        <div class="container-fluid">
          <div class="row">
            <div class="col-xl-4 col-lg-4 col-sm-6">
              <div class="icon-card mb-30">
                <div class="icon purple"><i class="lni lni-laptop"></i></div>
                <div class="content">
                  <h6 class="mb-10">Tổng Sản Phẩm</h6>
                  <h3 class="text-bold mb-10" id="productCount">0</h3>
                </div>
              </div>
            </div>
            <div class="col-xl-4 col-lg-4 col-sm-6">
              <div class="icon-card mb-30">
                <div class="icon success"><i class="lni lni-grid-alt"></i></div>
                <div class="content">
                  <h6 class="mb-10">Tổng Danh Mục</h6>
                  <h3 class="text-bold mb-10" id="categoryCount">0</h3>
                </div>
              </div>
            </div>
            <div class="col-xl-4 col-lg-4 col-sm-6">
              <div class="icon-card mb-30">
                <div class="icon primary"><i class="lni lni-tag"></i></div>
                <div class="content">
                  <h6 class="mb-10">Tổng Hãng</h6>
                  <h3 class="text-bold mb-10" id="brandCount">0</h3>
                </div>
              </div>
            </div>
          </div>
          
          <div class="row">
            <div class="col-lg-7">
              <div class="card-style mb-30">
                <div class="chart">
                  <canvas id="Chart1" style="width: 100%; height: 400px;"></canvas>
                </div>
              </div>
            </div>
            <div class="col-lg-5">
              <div class="card-style mb-30">
                <div class="chart">
                  <canvas id="Chart2" style="width: 100%; height: 400px;"></canvas>
                </div>
              </div>
            </div>
          </div>
          
        </div>
      </section>
    </main>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/Chart.min.js}"></script>
    <script th:src="@{/js/dynamic-pie-chart.js}"></script>
    <script th:src="@{/js/moment.min.js}"></script>
    <script th:src="@{/js/fullcalendar.js}"></script>
    <script th:src="@{/js/jvectormap.min.js}"></script>
    <script th:src="@{/js/world-merc.js}"></script>
    <script th:src="@{/js/polyfill.js}"></script>
    <script th:src="@{/js/main.js}"></script>

    <script th:inline="javascript">
    /*<![CDATA[*/
      
      // 1. Khối Fetch gọi dữ liệu từ API Thống kê của bạn
      fetch('/api/dashboard')
        .then(response => response.json())
        .then(data => {
            document.getElementById("productCount").innerText = data.products;
            document.getElementById("categoryCount").innerText = data.categories;
            document.getElementById("brandCount").innerText = data.brands;
        })
        .catch(error => console.error('Lỗi khi gọi API:', error));

      // 2. Khối vẽ biểu đồ Chart 1
      const ctx1 = document.getElementById("Chart1").getContext("2d");
      const chart1 = new Chart(ctx1, {
        type: "line",
        data: {
          labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
          datasets: [{
            label: "Sales",
            backgroundColor: "transparent",
            borderColor: "#365CF5",
            data: [600, 800, 750, 880, 940, 880, 900, 770, 920, 890, 976, 1100],
            borderWidth: 3
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      // 3. Khối vẽ biểu đồ Chart 2
      const ctx2 = document.getElementById("Chart2").getContext("2d");
      const chart2 = new Chart(ctx2, {
        type: "bar",
        data: {
          labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"],
          datasets: [{
            label: "Revenue",
            backgroundColor: "#365CF5",
            data: [600, 700, 1000, 700, 650, 800, 690, 740, 720, 1120, 876, 900]
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

    /*]]>*/
    </script>
  </body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.sidebar{
    min-height:100vh;
    background:#212529;
}
.sidebar a{
    color:white;
    text-decoration:none;
    display:block;
    padding:12px;
}
.sidebar a:hover{
    background:#343a40;
}
.card{
    border:none;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>

</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">

            <h3 class="text-white text-center mt-3">
                Laptop Shop
            </h3>

            <hr class="text-white">

            <a href="/admin/dashboard">
                Dashboard
            </a>

            <a href="/admin/categories">
                Danh Mục
            </a>

            <a href="/admin/brands">
                Hãng
            </a>

            <a href="/admin/products">
                Sản Phẩm
            </a>

        </div>

        <!-- Content -->
        <div class="col-md-10">

            <div class="p-4">

                <h2>Dashboard</h2>

                <div class="row mt-4">

                    <div class="col-md-4">
                        <div class="card bg-primary text-white">
                            <div class="card-body text-center">
                                <h5>Tổng Sản Phẩm</h5>
                                <h2 id="productCount">0</h2>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card bg-success text-white">
                            <div class="card-body text-center">
                                <h5>Tổng Danh Mục</h5>
                                <h2 id="categoryCount">0</h2>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="card bg-warning text-dark">
                            <div class="card-body text-center">
                                <h5>Tổng Hãng</h5>
                                <h2 id="brandCount">0</h2>
                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

<script>

fetch('/api/dashboard')
.then(response => response.json())
.then(data => {

    document.getElementById('productCount').innerText =
        data.products;

    document.getElementById('categoryCount').innerText =
        data.categories;

    document.getElementById('brandCount').innerText =
        data.brands;
});

</script>

</body>
</html>
